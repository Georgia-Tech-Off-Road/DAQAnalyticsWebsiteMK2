# Nginx configuration file for the reverse proxy server
# Reverese proxy server forwards request to our main backend, needed for SSL encryption, also good design
events {}

pid nginx.pid;

http {
        server {
                listen 80;

                # Pass all requests to our backend
                location / {
                        proxy_pass http://localhost:3000;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host $host;
                }
        }
}
