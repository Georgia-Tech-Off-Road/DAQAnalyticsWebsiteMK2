# Nginx configuration file for the reverse proxy server
# Reverse proxy server forwards request to our main backend, needed for SSL encryption, also good design
# Should be moved to /etc/nginx/conf.d/
server {
    listen 80 default_server;
    server_name localhost 100.49.95.165 _;
    # Pass all requests to our backend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
     }
}
